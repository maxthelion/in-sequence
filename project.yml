name: SequencerAI
options:
  bundleIdPrefix: ai.sequencer
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""

fileGroups:
  - docs
  - wiki

targets:
  SequencerAI:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Sources/Resources/Info.plist
        buildPhase: none
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleDisplayName: SequencerAI
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundleShortVersionString: "0.0.1"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        CFBundleDocumentTypes:
          - CFBundleTypeName: SequencerAI Project
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - ai.sequencer.document
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: ai.sequencer.document
            UTTypeDescription: SequencerAI Project
            UTTypeConformsTo:
              - public.data
              - public.content
            UTTypeTagSpecification:
              public.filename-extension:
                - seqai
    entitlements:
      path: Sources/Resources/SequencerAI.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.application-groups: []
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sequencer.SequencerAI
        GENERATE_INFOPLIST_FILE: NO

  SequencerAITests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SequencerAITests
    dependencies:
      - target: SequencerAI
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/SequencerAI.app/Contents/MacOS/SequencerAI

schemes:
  SequencerAI:
    build:
      targets:
        SequencerAI: all
        SequencerAITests: [test]
    test:
      targets:
        - SequencerAITests
